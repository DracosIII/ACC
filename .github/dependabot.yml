version: 2
updates:
  # Surveiller les vulnérabilités et mises à jour npm (Node.js) dans le dossier web
  - package-ecosystem: "npm"
    directory: "/Serveur/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Surveiller les mises à jour des images de base Docker
  - package-ecosystem: "docker"
    directory: "/Serveur/web"
    schedule:
      interval: "weekly"

  # Surveiller les versions des GitHub Actions utilisées
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

version: '3.8'

services:
  # --- INFRASTRUCTURE DNS ---
  dns-server:
    container_name: technitium-dns
    image: technitium/dns-server:latest
    network_mode: "host"
    environment:
      - TZ=Europe/Paris
      - DNS_SERVER_DOMAIN=dns-server
    volumes:
      - /srv/technitium-dns/config:/etc/dns
    restart: unless-stopped

  # --- REVERSE PROXY ---
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - /srv/nginx-proxy/data:/data
      - /srv/nginx-proxy/letsencrypt:/etc/letsencrypt

  # --- MONITORING RÉSEAU (NTopNG) ---
  ntopng-redis:
    image: redis:alpine
    container_name: ntopng-redis
    restart: unless-stopped
    volumes:
      - /srv/NTopNG/redis_data:/data

  ntopng:
    image: ntop/ntopng:latest
    container_name: ntopng
    restart: unless-stopped
    depends_on:
      - ntopng-redis
    network_mode: "host"
    privileged: true
    volumes:
      - /srv/NTopNG/ntopng_data:/var/lib/ntopng
    command:
      - "-i=eth0"
      - "-w=3000"
      - "-r=127.0.0.1:6379"
      - "-n=1"
      - "-d=/var/lib/ntopng"

  # --- VPN (Wireguard) ---
  wg-easy:
    container_name: wg-easy
    image: ghcr.io/wg-easy/wg-easy
    network_mode: "bridge"
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    environment:
      - TZ=Europe/Paris
      - WG_HOST=78.129.30.49
      - WG_DEFAULT_DNS=1.1.1.1
      - WG_MTU=1280
      - WG_PERSISTENT_KEEPALIVE=25
      - PASSWORD=${WG_PASSWORD}
      - WG_ALLOWED_IPS=192.168.31.0/24, 10.8.0.0/24
    volumes:
      - /srv/wg/wireguard:/etc/wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1

  # --- DOMOTIQUE ---
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - /home/dns/homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
